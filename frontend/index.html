<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibentra - Where Vibes Connect</title>
    <meta name="description" content="Vibentra is a modern music platform where vibes connect. Listen to your favorite tracks, manage playlists, and discover new artists.">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#0F172A">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3659/3659784.png">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => console.log('ServiceWorker registered'))
                    .catch(error => console.log('ServiceWorker registration failed: ', error));
            });
        }
    </script>
</head>
<body>
    <div class="splash-screen" id="splashScreen">
        <div class="logo-container">
            <h1>VIBENTRA</h1>
            <p>"Where Vibes Connect."</p>
            <div class="soundwave">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
        </div>
    </div>

    <!-- The app logic will handle redirecting from splash to auth or home based on session -->
    <script type="module" src="./js/firebase-config.js"></script>
    <script type="module" src="./js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibentra - Where Vibes Connect</title>
    <meta name="description" content="Vibentra is a modern music platform where vibes connect. Listen to your favorite tracks, manage playlists, and discover new artists.">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#0F172A">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3659/3659784.png">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        // PWA Service Worker Registration & Update Logic
        if ('serviceWorker' in navigator) {
            let newWorker;
            let refreshing = false;
            
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!refreshing) {
                    window.location.reload();
                    refreshing = true;
                }
            });

            window.addEventListener('load', () => {
                // Dynamically inject the update popup UI
                const updatePopup = document.createElement('div');
                updatePopup.id = 'pwa-update-popup';
                updatePopup.style.cssText = `
                    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
                    background: var(--cards, #1E293B); color: white; padding: 15px 20px;
                    border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
                    display: none; align-items: center; gap: 15px; z-index: 9999;
                    border: 1px solid var(--primary, #7C3AED); font-family: sans-serif;
                `;
                updatePopup.innerHTML = `
                    <span style="font-size: 0.95rem;">A new version is available!</span>
                    <button id="pwa-update-btn" style="background: var(--primary, #7C3AED); color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold;">Update</button>
                `;
                document.body.appendChild(updatePopup);

                document.getElementById('pwa-update-btn').addEventListener('click', () => {
                    if (newWorker) newWorker.postMessage({ type: 'SKIP_WAITING' });
                });

                navigator.serviceWorker.register('./sw.js').then(reg => {
                    reg.addEventListener('updatefound', () => {
                        newWorker = reg.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                updatePopup.style.display = 'flex';
                            }
                        });
                    });
                    if (reg.waiting) {
                        newWorker = reg.waiting;
                        updatePopup.style.display = 'flex';
                    }
                }).catch(err => console.log('SW registration failed: ', err));
            });
        }
    </script>
</head>
<body>
    <div class="splash-screen" id="splashScreen">
        <div class="logo-container">
            <h1>VIBENTRA</h1>
            <p>"Where Vibes Connect."</p>
            <div class="soundwave">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
        </div>
    </div>

    <!-- The app logic will handle redirecting from splash to auth or home based on session -->
    <script type="module" src="./js/firebase-config.js"></script>
    <script type="module" src="./js/app.js"></script>
</body>
</html>
